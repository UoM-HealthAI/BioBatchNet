# Baseline Configuration for Batch Effect Correction Methods

# Method configurations
methods:
  scVI:
    embed: X_scvi
    need_pca: false
    type: nn
    preprocess: [hvg]

  iMAP:
    embed: X_imap
    need_pca: true
    type: nn
    preprocess: [hvg, normalize, log1p]

  MRVI:
    embed: X_mrvi
    need_pca: false
    type: nn
    preprocess: [hvg]

  Harmony:
    embed: X_pca_harmony
    need_pca: false
    type: non_nn
    preprocess: [hvg, normalize, log1p, pca]

  BBKNN:
    embed: X_bbknn
    need_pca: false
    type: non_nn
    preprocess: [hvg, normalize, log1p, pca]

  Scanorama:
    embed: X_scanorama
    need_pca: false
    type: non_nn
    preprocess: [hvg, normalize, log1p, pca]

  Combat:
    embed: X_combat
    need_pca: true
    type: non_nn
    preprocess: [hvg, normalize, log1p]

# Dataset configurations
datasets:
  subDamond_full:
    path: ../Data/IMC/h5ad_format/subDamond_full.h5ad
    mode: imc
    sampling_fraction: 0.2
    sampling_seed: 42
    seed_list: [42, 52, 62, 72, 82]

  HochSchulz:
    path: ../Data/IMC/h5ad_format/HochSchulz.h5ad
    mode: imc
    sampling_fraction: 0.1
    sampling_seed: 42
    seed_list: [42, 52, 62, 72, 82]

  IMMUcan_batch:
    path: ../Data/IMC/h5ad_format/IMMUcan_batch.h5ad
    mode: imc
    sampling_fraction: 1.0
    sampling_seed: 42
    seed_list: [42, 52, 62, 72, 82]

  pancreas:
    path: ../Data/scRNA-seq/pancreas.h5ad
    mode: seq
    sampling_fraction: 1.0
    sampling_seed: 42
    seed_list: [42, 52, 62, 72, 82]

  macaque:
    path: ../Data/scRNA-seq/macaque.h5ad
    mode: seq
    sampling_fraction: 1.0
    sampling_seed: 42
    seed_list: [42, 52, 62, 72, 82]

  SubMouseBrain:
    path: ../Data/scRNA-seq/SubMouseBrain.h5ad
    mode: seq
    sampling_fraction: 1.0
    sampling_seed: 42
    seed_list: [42, 52, 62, 72, 82]
